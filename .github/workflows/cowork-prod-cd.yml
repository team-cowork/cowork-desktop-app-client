name: cowork prod CD Workflow

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  Mac-OS-Release:
    runs-on: macos-latest
    environment: 'Prod-CD'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version
        id: version
        run: |
          DATE=$(date -u +%Y%m%d)
          LAST=$(git tag -l "v${DATE}.*" | sort -t. -k2 -n | tail -1)
          if [ -z "$LAST" ]; then
            N=0
          else
            LAST_N=$(echo "$LAST" | sed "s/v${DATE}\.//")
            N=$((LAST_N + 1))
          fi
          echo "tag=v${DATE}.${N}" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        id: notes
        run: |
          LAST_TAG=$(git tag --sort=-version:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" "${LAST_TAG}..HEAD")
          fi
          {
            echo 'body<<EOF'
            echo "## 수정내역"
            echo "$COMMITS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create And Push Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Import Signing Certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "temp_password" "$KEYCHAIN_PATH"
          security unlock-keychain -p "temp_password" "$KEYCHAIN_PATH"
          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "temp_password" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          echo "SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          rm -f certificate.p12

      - name: Build Distributable
        run: ./gradlew :composeApp:createDistributable

      - name: Sign App Bundle
        run: |
          APP="composeApp/build/compose/binaries/main/app/cowork.app"
          IDENTITY="Developer ID Application: Gwangju Software Meister High School (UB2797YAAH)"
          codesign --deep --force --verify \
            --sign "$IDENTITY" \
            --keychain "$SIGNING_KEYCHAIN" \
            --options runtime \
            --timestamp \
            "$APP"

      - name: Create DMG
        run: |
          APP="composeApp/build/compose/binaries/main/app/cowork.app"
          DMG_DIR="composeApp/build/compose/binaries/main/dmg"
          mkdir -p "$DMG_DIR"
          hdiutil create -volname "cowork" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "$DMG_DIR/cowork-1.0.0.dmg"

      - name: Sign DMG
        run: |
          IDENTITY="Developer ID Application: Gwangju Software Meister High School (UB2797YAAH)"
          codesign --sign "$IDENTITY" \
            --keychain "$SIGNING_KEYCHAIN" \
            --timestamp \
            "composeApp/build/compose/binaries/main/dmg/cowork-1.0.0.dmg"

      - name: Notarize DMG
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PWD: ${{ secrets.NOTARIZATION_PWD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: |
          xcrun notarytool submit \
            "composeApp/build/compose/binaries/main/dmg/cowork-1.0.0.dmg" \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --password "$NOTARIZATION_PWD" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --wait

      - name: Staple Notarization Ticket
        run: xcrun stapler staple "composeApp/build/compose/binaries/main/dmg/cowork-1.0.0.dmg"

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          draft: true
          files: composeApp/build/compose/binaries/main/dmg/*.dmg

  Notify-Discord:
    runs-on: ubuntu-latest
    needs: Mac-OS-Release
    if: always()
    steps:
      - name: Send Discord Notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ needs.Mac-OS-Release.result }}
          title: "cowork macOS 릴리즈"
          description: |
            **브랜치**: ${{ github.ref_name }}
            **커밋**: ${{ github.event.head_commit.message }}
          color: ${{ needs.Mac-OS-Release.result == 'success' && '0x57F287' || '0xED4245' }}
          username: "cowork CD"
