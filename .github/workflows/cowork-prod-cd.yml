name: cowork prod CD Workflow

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  Mac-OS-Release:
    runs-on: macos-latest
    environment: Prod-CD
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate Version
        id: version
        run: |
          DATE=$(date -u +"%Y%m%d")
          EXISTING=$(git tag -l "v${DATE}.*" | wc -l | tr -d ' ')
          echo "tag=v${DATE}.${EXISTING}" >> "$GITHUB_OUTPUT"
          echo "app_version=${DATE:2:2}.${DATE:4:2}.$((10#${DATE:6:2} * 10 + EXISTING))" >> "$GITHUB_OUTPUT"
          echo "dmg_name=cowork-${DATE}.${EXISTING}.dmg" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        run: |
          LAST_TAG=$(git tag --sort=-version:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" "${LAST_TAG}..HEAD")
          fi
          {
            echo "## 수정내역"
            echo "$COMMITS"
          } > release_notes.md

      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
          cache-cleanup: always

      - name: Import Signing Certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "temp_password" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "temp_password" "$KEYCHAIN_PATH"

          security import /tmp/certificate.p12 \
            -P "$MACOS_CERTIFICATE_PWD" \
            -A \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          IDENTITIES=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH")
          echo "$IDENTITIES"
          if ! echo "$IDENTITIES" | grep -q "Developer ID Application"; then
            echo "::error::No Developer ID Application signing identity was imported. Check MACOS_CERTIFICATE contains a .p12 with the private key and MACOS_CERTIFICATE_PWD is correct."
            exit 1
          fi

          security set-key-partition-list -S apple-tool:,apple: -s -k "temp_password" "$KEYCHAIN_PATH"
          echo "SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          rm /tmp/certificate.p12

      - name: Build Distributable
        run: ./gradlew :composeApp:createDistributable -PcoworkAppVersion=${{ steps.version.outputs.app_version }}

      - name: Sign App Bundle
        run: |
          APP="composeApp/build/compose/binaries/main/app/cowork.app"
          IDENTITY="Developer ID Application: Gwangju Software Meister High School (UB2797YAAH)"
          security unlock-keychain -p "temp_password" "$SIGNING_KEYCHAIN"

          while IFS= read -r file; do
            if file "$file" | grep -Eq 'Mach-O|dynamically linked shared library'; then
              echo "Signing nested binary: $file"
              codesign --force \
                --sign "$IDENTITY" \
                --keychain "$SIGNING_KEYCHAIN" \
                --options runtime \
                --timestamp \
                "$file"
            fi
          done < <(find "$APP/Contents" -type f)

          while IFS= read -r bundle; do
            echo "Signing nested bundle: $bundle"
            codesign --force \
              --sign "$IDENTITY" \
              --keychain "$SIGNING_KEYCHAIN" \
              --options runtime \
              --timestamp \
              "$bundle"
          done < <(find "$APP/Contents" -type d \( -name "*.framework" -o -name "*.app" \) | sort -r)

          codesign --force --verify \
            --sign "$IDENTITY" \
            --keychain "$SIGNING_KEYCHAIN" \
            --options runtime \
            --timestamp \
            "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Notarize App Bundle
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PWD: ${{ secrets.NOTARIZATION_PWD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: |
          APP="composeApp/build/compose/binaries/main/app/cowork.app"
          APP_ZIP="composeApp/build/compose/binaries/main/app/cowork.app.zip"

          ditto -c -k --keepParent "$APP" "$APP_ZIP"
          xcrun notarytool submit "$APP_ZIP" \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --password "$NOTARIZATION_PWD" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --wait \
            --output-format json \
            | tee app-notarization.json

          APP_NOTARIZATION_ID=$(ruby -rjson -e 'puts JSON.parse(File.read("app-notarization.json")).fetch("id")')
          APP_NOTARIZATION_STATUS=$(ruby -rjson -e 'puts JSON.parse(File.read("app-notarization.json")).fetch("status")')
          if [ "$APP_NOTARIZATION_STATUS" != "Accepted" ]; then
            xcrun notarytool log "$APP_NOTARIZATION_ID" \
              --apple-id "$NOTARIZATION_APPLE_ID" \
              --password "$NOTARIZATION_PWD" \
              --team-id "$NOTARIZATION_TEAM_ID"
            echo "::error::App notarization failed with status: $APP_NOTARIZATION_STATUS"
            exit 1
          fi

      - name: Staple App Bundle
        run: |
          APP="composeApp/build/compose/binaries/main/app/cowork.app"

          for attempt in {1..10}; do
            echo "Stapling app notarization ticket, attempt ${attempt}/10"
            if xcrun stapler staple -v "$APP"; then
              xcrun stapler validate -v "$APP"
              exit 0
            fi

            echo "App notarization ticket is not available yet. Waiting 30 seconds..."
            sleep 30
          done

          echo "::error::Failed to staple app notarization ticket after 10 attempts."
          exit 1

      - name: Create DMG
        run: |
          APP="composeApp/build/compose/binaries/main/app/cowork.app"
          DMG_DIR="composeApp/build/compose/binaries/main/dmg"
          mkdir -p "$DMG_DIR"
          hdiutil create -volname "cowork" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "$DMG_DIR/${{ steps.version.outputs.dmg_name }}"

      - name: Sign DMG
        run: |
          IDENTITY="Developer ID Application: Gwangju Software Meister High School (UB2797YAAH)"
          security unlock-keychain -p "temp_password" "$SIGNING_KEYCHAIN"
          codesign --sign "$IDENTITY" \
            --keychain "$SIGNING_KEYCHAIN" \
            --timestamp \
            "composeApp/build/compose/binaries/main/dmg/${{ steps.version.outputs.dmg_name }}"

      - name: Notarize DMG
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PWD: ${{ secrets.NOTARIZATION_PWD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: |
          xcrun notarytool submit \
            "composeApp/build/compose/binaries/main/dmg/${{ steps.version.outputs.dmg_name }}" \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --password "$NOTARIZATION_PWD" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --wait \
            --output-format json \
            | tee dmg-notarization.json

          DMG_NOTARIZATION_ID=$(ruby -rjson -e 'puts JSON.parse(File.read("dmg-notarization.json")).fetch("id")')
          DMG_NOTARIZATION_STATUS=$(ruby -rjson -e 'puts JSON.parse(File.read("dmg-notarization.json")).fetch("status")')
          if [ "$DMG_NOTARIZATION_STATUS" != "Accepted" ]; then
            xcrun notarytool log "$DMG_NOTARIZATION_ID" \
              --apple-id "$NOTARIZATION_APPLE_ID" \
              --password "$NOTARIZATION_PWD" \
              --team-id "$NOTARIZATION_TEAM_ID"
            echo "::error::DMG notarization failed with status: $DMG_NOTARIZATION_STATUS"
            exit 1
          fi

      - name: Staple Notarization Ticket
        run: |
          DMG="composeApp/build/compose/binaries/main/dmg/${{ steps.version.outputs.dmg_name }}"

          for attempt in {1..10}; do
            echo "Stapling DMG notarization ticket, attempt ${attempt}/10"
            if xcrun stapler staple -v "$DMG"; then
              xcrun stapler validate -v "$DMG"
              exit 0
            fi

            echo "DMG notarization ticket is not available yet. Waiting 30 seconds..."
            sleep 30
          done

          echo "::warning::Failed to staple DMG notarization ticket after 10 attempts. The app bundle inside the DMG is already stapled, and the DMG notarization was accepted."

      - name: Create Tag
        run: git tag ${{ steps.version.outputs.tag }}

      - name: Push Tag
        run: git push origin ${{ steps.version.outputs.tag }}

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          draft: true
          files: composeApp/build/compose/binaries/main/dmg/${{ steps.version.outputs.dmg_name }}

  Notify-Discord:
    runs-on: ubuntu-latest
    needs: Mac-OS-Release
    if: always()

    steps:
      - name: Get Short SHA
        id: sha
        run: echo "short=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Determine Status
        id: status
        run: |
          if [[ "${{ needs.Mac-OS-Release.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=0x4CAF50" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.Mac-OS-Release.result }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "color=0xFF4C4C" >> $GITHUB_OUTPUT
          else
            echo "status=cancelled" >> $GITHUB_OUTPUT
            echo "color=0xFFA500" >> $GITHUB_OUTPUT
          fi

      - name: Send Discord Notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_INFORMATION_ALERT_CHANNEL_WEBHOOK }}
          status: ${{ steps.status.outputs.status }}
          color: ${{ steps.status.outputs.color }}
          title: "cowork App Client Prod CD"
          description: |
            `${{ github.ref_name }}` · `${{ steps.sha.outputs.short }}` · by **${{ github.actor }}**
            **Release:** ${{ needs.Mac-OS-Release.outputs.tag }}
          username: "cowork CD"
